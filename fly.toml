app = "mizchi-test-elixir"
primary_region = "nrt"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  PHX_SERVER = "true"
  PHX_HOST = "mizchi-test-elixir.fly.dev"
  PORT = "4000"
  ENABLE_DISTRIBUTED_ERLANG = "false"

[http_service]
  internal_port = 4000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
